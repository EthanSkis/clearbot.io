<!-- Shared topbar + sidebar. Injected by app.js loadChrome() into each page's
     <div data-chrome></div> placeholder so we don't copy-paste across files.
     `data-crumb` on the placeholder sets the breadcrumb text. -->
<header class="topbar" role="banner">
  <a class="brand" href="/" aria-label="ClearBot Client Portal home">
    <svg class="mark-logo" width="20" height="20" aria-hidden="true"><use href="#clearbot-logo"/></svg>
    <span class="brand-name">ClearBot<em>/portal</em></span>
  </a>
  <nav class="crumbs" aria-label="Breadcrumb">
    <span>Portal</span><span class="sep">/</span><span class="here" data-crumb-here>Home</span>
  </nav>
  <button class="user" data-user aria-label="Account menu">
    <span class="name" data-user-name>…</span>
    <span class="avatar" data-user-initial aria-hidden="true">•</span>
  </button>
</header>

<aside class="sidebar" aria-label="Portal navigation">
  <a class="nav-item" data-nav="index" href="/">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>
    Home
  </a>
  <a class="nav-item" data-nav="messages" href="/messages">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h16v12H8l-4 3z"/></svg>
    Messages
  </a>
  <div class="sidebar-group">Account</div>
  <a class="nav-item" data-nav="settings" href="/settings">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
    Settings
  </a>
  <button class="nav-item" type="button" data-signout>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    Sign Out
  </button>
  <div class="spacer"></div>
  <div class="foot"><a href="https://clearbot.io">← Main Site</a></div>
</aside>
