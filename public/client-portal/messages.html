<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages · ClearBot Portal</title>
<link rel="icon" type="image/svg+xml" href="/client-portal/assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/client-portal/css/styles.css" />
</head>
<body data-page="messages">
<div class="splash" aria-hidden="true"><span class="dot"></span><span>Checking session…</span></div>
<div class="grain" aria-hidden="true"></div>

<div class="app">

  <div data-chrome data-crumb="Messages"></div>

  <main class="main">

    <div class="page-head">
      <div>
        <div class="eyebrow">§ Messages</div>
        <h1>Your <em>project conversations</em>.</h1>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-primary" data-new-thread>+ New thread</button>
      </div>
    </div>

    <div class="msg-shell">
      <div class="msg-list">
        <div class="msg-search">
          <input class="input" type="search" placeholder="Search threads…" />
        </div>
        <div class="msg-threads" data-threads></div>
      </div>
      <div class="msg-pane" data-thread-pane></div>
    </div>

  </main>

</div>

<script type="module" src="/client-portal/js/app.js"></script>
</body>
</html>
