<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home · ClearBot Portal</title>
<meta name="description" content="ClearBot Client Portal — your active work, at a glance." />
<link rel="icon" type="image/svg+xml" href="/client-portal/assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/client-portal/css/styles.css" />
</head>
<body data-page="dashboard">
<div class="splash" aria-hidden="true"><span class="dot"></span><span>Checking session…</span></div>
<div class="grain" aria-hidden="true"></div>

<div class="app">

  <div data-chrome data-crumb="Home"></div>

  <main class="main">

    <div class="page-head">
      <div>
        <div class="eyebrow">§ Portal</div>
        <h1 data-greeting>Welcome back.</h1>
      </div>
      <div class="actions">
        <a href="/messages" class="btn">Message us</a>
        <button type="button" class="btn btn-primary" data-action="new-project">+ New request</button>
      </div>
    </div>

    <section class="panel bracketed" style="margin-bottom:28px;">
      <div class="panel-head">
        <div class="panel-head-text">
          <h2>Your work</h2>
          <span class="panel-sub" data-projects-count></span>
        </div>
      </div>
      <div data-projects-list></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>§ Activity</h2>
      </div>
      <div class="feed" data-activity></div>
    </section>

    <p class="mono" style="margin-top:28px;font-size:11px;color:var(--ink-dim);letter-spacing:0.04em;">
      Looking for something new? <a href="https://clearbot.io#services" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px;">Browse services → clearbot.io</a>
    </p>

  </main>

</div>

<script type="module" src="/client-portal/js/app.js"></script>
</body>
</html>
